providers:
  webSearch: auto
symbolPreset: nerd
theme:
  light: light
setupVersion: 1
modelRoles:
  default: openai-codex/gpt-5.6-luna:max
  slow: openai-codex/gpt-5.6-luna:max
  advisor: openai-codex/gpt-5.6-luna:max
  plan: openai-codex/gpt-5.6-luna:max
advisor:
  enabled: true
  syncBacklog: "1"
plan:
  defaultOnStartup: true
defaultThinkingLevel: max
textVerbosity: low
codexResets:
  autoRedeem: "yes"
hideThinkingBlock: true
lsp:
  diagnosticsOnEdit: true
  diagnosticsOnWrite: true
tools:
  approvalMode: yolo
  approval:
    delete: prompt
    move: prompt
checkpoint:
  enabled: true
task:
  isolation:
    mode: auto
    merge: patch
dev:
  autoqa:
    consent: granted
